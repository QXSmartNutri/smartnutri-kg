name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: "🏗️ Build GitHub Pages"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build site structure
        run: |
          mkdir -p _site
          mkdir -p _site/data/jsonld
          mkdir -p _site/standards
          mkdir -p _site/ontology

          # Copy viewer nếu có
          if [ -d "src/viewer" ]; then
            cp -r src/viewer/. _site/
            echo "✅ Viewer copied"
          else
            echo "⚠️  src/viewer not found — creating placeholder"
            cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="vi">
          <head>
            <meta charset="UTF-8">
            <title>SmartNutri KG</title>
            <style>
              body { background:#0d1117; color:#e6edf3; font-family:monospace;
                     display:flex; align-items:center; justify-content:center;
                     height:100vh; margin:0; flex-direction:column; gap:16px; }
              h1 { color:#58a6ff; }
              p  { color:#8b949e; }
              a  { color:#58a6ff; }
            </style>
          </head>
          <body>
            <h1>⬡ SmartNutri Knowledge Graph</h1>
            <p>v1.0.0 — Phase 1 · Setting up...</p>
            <a href="manifest.json">View manifest.json</a>
            <a href="data/index.json">View data index</a>
          </body>
          </html>
          HTML
          fi

          # Copy data
          if [ -d "data/jsonld" ]; then
            cp -r data/jsonld/. _site/data/jsonld/
            echo "✅ Data copied"
          fi

          # Copy standards
          if [ -d "standards" ]; then
            cp standards/*.json _site/standards/ 2>/dev/null || true
            echo "✅ Standards copied"
          fi

          # Copy ontology
          if [ -d "ontology" ]; then
            cp -r ontology/. _site/ontology/ 2>/dev/null || true
            echo "✅ Ontology copied"
          fi

          # Generate manifest.json
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');

          function countFiles(dir, ext) {
            let count = 0;
            if (!fs.existsSync(dir)) return 0;
            function walk(d) {
              try {
                fs.readdirSync(d).forEach(f => {
                  const full = path.join(d, f);
                  if (fs.statSync(full).isDirectory()) walk(full);
                  else if (f.endsWith(ext)) count++;
                });
              } catch(e) {}
            }
            walk(dir);
            return count;
          }

          const manifest = {
            name: "SmartNutri Knowledge Graph",
            version: "1.0.0",
            built: new Date().toISOString(),
            phase: "Phase 1 — In Progress",
            stats: {
              jsonld_files:    countFiles('data/jsonld', '.jsonld'),
              standards_files: countFiles('standards', '.json'),
              ontology_files:  countFiles('ontology', '.ttl'),
              schema_files:    countFiles('schemas', '.json')
            },
            urls: {
              viewer:   "https://qxsmartnutri.github.io/smartnutri-kg/",
              github:   "https://github.com/QXSmartNutri/smartnutri-kg",
              manifest: "https://qxsmartnutri.github.io/smartnutri-kg/manifest.json"
            }
          };

          fs.writeFileSync('_site/manifest.json', JSON.stringify(manifest, null, 2));
          console.log('✅ manifest.json generated');
          console.log(JSON.stringify(manifest.stats, null, 2));
          EOF

          # Generate data/index.json
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const index = {
            generated: new Date().toISOString(),
            datasets: {}
          };

          const FOLDERS = [
            'nutrients','foods','herbs','bioactives','toxic',
            'diseases','symptoms','drugs','brands',
            'anatomy/systems','anatomy/organs',
            'anatomy/tissues','anatomy/cells',
            'metabolism/processes','metabolism/pathways'
          ];

          FOLDERS.forEach(folder => {
            const dir = path.join('data/jsonld', folder);
            if (!fs.existsSync(dir)) {
              index.datasets[folder] = { status: 'pending', count: 0, files: [] };
              return;
            }
            const files = fs.readdirSync(dir)
              .filter(f => f.endsWith('.jsonld'))
              .map(f => ({ name: f, url: `./data/jsonld/${folder}/${f}` }));
            index.datasets[folder] = {
              status: files.length > 0 ? 'active' : 'empty',
              count: files.length,
              files: files
            };
          });

          fs.mkdirSync('_site/data', { recursive: true });
          fs.writeFileSync('_site/data/index.json', JSON.stringify(index, null, 2));
          console.log('✅ data/index.json generated');
          EOF

          echo ""
          echo "=== Build complete ==="
          echo "Files in _site/:"
          find _site -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    name: "🚀 Deploy to GitHub Pages"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: "📣 Deployment Summary"
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Build:  ${{ needs.build.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Live: https://qxsmartnutri.github.io/smartnutri-kg/"
          fi       
